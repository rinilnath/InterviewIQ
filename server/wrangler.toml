name = "interviewiq-api"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Deployment target ─────────────────────────────────────────────────────────
# wrangler deploy        → deploys to Cloudflare Workers (migration target)
# node server.js         → current production runtime (Render)
#
# Do NOT deploy this Worker to production until all routes have been ported
# from server.js. See migration roadmap in worker.js.
[observability.logs]
enabled = true
invocation_logs = true
