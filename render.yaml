services:
  - type: web
    name: interviewiq
    runtime: node
    region: singapore
    plan: free

    # NOTE: If you deployed this service manually via the Render dashboard,
    # copy these values into Dashboard → Settings:
    #   Build Command: npm install && npm run build
    #   Start Command: npm start
    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PAYMENT_UPI_ID
        sync: false
      - key: PAYMENT_ACCOUNT_NUMBER
        sync: false
      - key: PAYMENT_IFSC
        sync: false
      - key: PAYMENT_BANK_NAME
        sync: false
      - key: PAYMENT_BANK_BRANCH
        sync: false
      - key: PAYMENT_SWIFT_CODE
        sync: false
      - key: APP_URL
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
